name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win
            cmd: npx electron-builder --win --x64 --publish always
          - os: macos-latest
            platform: mac
            cmd: npx electron-builder --mac --x64 --publish always
          - os: ubuntu-latest
            platform: linux
            cmd: npx electron-builder --linux --x64 --publish always

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm install

      - name: Build Rust backend
        run: |
          cd rust-backend
          cargo build --release
        shell: bash

      - name: Build Electron app
        run: ${{ matrix.cmd }}
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-build
          path: dist/*
          retention-days: 7
