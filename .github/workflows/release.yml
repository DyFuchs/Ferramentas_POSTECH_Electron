name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-win:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: dtolnay/rust-toolchain@stable
      - run: npm install
      - name: Build Rust backend
        run: cd rust-backend && cargo build --release
      - name: Build Electron (publish)
        run: npx electron-builder --win --x64 --publish always
        env:
          GH_TOKEN: ${{ github.token }}
      - uses: actions/upload-artifact@v4
        with:
          name: win-build
          path: dist/*.exe

  build-mac:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: dtolnay/rust-toolchain@stable
      - run: npm install
      - name: Build Rust backend
        run: cd rust-backend && cargo build --release
      - name: Build Electron (no publish)
        run: npx electron-builder --mac --x64 --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      - uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: dist/*.dmg

  build-linux:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: dtolnay/rust-toolchain@stable
      - run: npm install
      - name: Build Rust backend
        run: cd rust-backend && cargo build --release
      - name: Build Electron (no publish)
        run: npx electron-builder --linux --x64 --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: dist/*.AppImage

  release:
    needs: [build-win, build-mac, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.{exe,dmg,AppImage}
          draft: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
