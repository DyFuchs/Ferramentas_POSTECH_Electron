name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-win:
    runs-on: windows-latest
    defaults:
      run:
        shell: cmd
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: dtolnay/rust-toolchain@stable
      - run: npm install
      - name: Build Rust backend
        run: cd rust-backend && cargo build --release
      - name: Build and publish Electron
        run: npx electron-builder --win --x64 --publish always
        env:
          GH_TOKEN: ${{ github.token }}
      - uses: actions/upload-artifact@v4
        with:
          name: win-build
          path: dist/*.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin
      - run: npm install
      - name: Build Rust backend (x86_64 for Intel Mac compatibility)
        run: |
          cd rust-backend
          rustup target add x86_64-apple-darwin
          cargo build --release --target x86_64-apple-darwin
          mkdir -p target/release
          cp target/x86_64-apple-darwin/release/organizador-postech-backend target/release/organizador-postech-backend
      - name: Build and publish Electron
        run: npx electron-builder --mac --x64 --publish always
        env:
          GH_TOKEN: ${{ github.token }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      - uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: dist/*.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: dtolnay/rust-toolchain@stable
      - run: npm install
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 fakeroot rpm
      - name: Build Rust backend
        run: cd rust-backend && cargo build --release
      - name: Build and publish Electron
        run: npx electron-builder --linux --x64 --publish always
        env:
          GH_TOKEN: ${{ github.token }}
      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: dist/*.AppImage

  upload-release:
    needs: [build-win, build-mac, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Add artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.{exe,dmg,AppImage}
          fail_on_unmatched_files: false
          draft: false
        env:
          GITHUB_TOKEN: ${{ github.token }}
