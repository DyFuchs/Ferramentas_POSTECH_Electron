name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win
            shell: powershell
          - os: macos-latest
            platform: mac
            shell: bash
          - os: ubuntu-latest
            platform: linux
            shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm install

      - name: Build Rust backend
        run: |
          cd rust-backend
          cargo build --release

      - name: Build and publish
        shell: ${{ matrix.shell }}
        run: |
          if [ "${{ matrix.platform }}" = "mac" ]; then
            export CSC_IDENTITY_AUTO_DISCOVERY=false
          fi
          npx electron-builder --${{ matrix.platform }} --x64 --publish always
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-build
          path: dist/*
          retention-days: 7
